name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]   # gate on PRs into main (develop → main promotions)

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit

  hubspot-integration:
    name: HubSpot API integration (sandbox)
    runs-on: ubuntu-latest
    # Always test against sandbox — avoids creating test data in production.
    # By the time develop is merged to main, these tests have already passed.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Run HubSpot integration tests
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node scripts/test-hubspot.mjs
